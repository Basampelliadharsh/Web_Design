<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GridSystem</title>
    <link rel="stylesheet" href="grid.css">
  </head>
  <body>
    <form>
      <div class="ranjith">
        <h1 class="title">candiate details</h1>
        <!------------details--------->
        <h3>Details</h3>
        <div class="grid">

          <div>
            <label>username</label>
            <input type="text" placeholder="enter name" id="name" name="name" />
          </div>

          <div>
            <label>Surname</label>
            <input
              type="text"
              placeholder="enter surname"
              id="surname"
              name="surname"
            />
          </div>

          <div>
            <label>candiate</label>
            <input type="text" placeholder="candate name"/>
          </div>

          <div>
            <label>Father name</label>
            <input type="text" placeholder="fathername" name="fathername">
          </div>

          <div>
            <label>DOB</label>
            <input type="date" name="dob">
          </div>
        </div>

        <h3>Educational Details</h3>
        <div class="grid">
            <div>
                <label>10th Marks</label>
                <input type="number" name="marks"  placeholder="enter marks"/>
            </div>

            <div>
                <label>12th marks</label>
                <input type="number" name="12th marks" placeholder="entermarks"/>
            </div>

            <div>
                <label>bTech marks</label>
                <input type="number" placeholder="marks" />
            </div>

        </div>


        </div>
    </form>
  </body>
</html>
