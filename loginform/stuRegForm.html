<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="stuRegForm.css" />
  </head>

  <body>
    <div class="container">
      <form>
        <h2>Student Registration Form</h2>

        <div class="form-group">
          <label for="firstname">Firstname</label>
          <input type="text" id="firstname" name="firstname" />
          <span id="fullNameError" class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="middlename">Middlename</label>
          <input type="text" id="middlename" name="middlename" />
          <span id="middlenameError" class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="lastname">Lastname</label>
          <input type="text" id="lastname" name="lastname" />
          <span id="lastnameError" class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" name="dob" />
          <span id="dobError" class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="course">Course</label>
          <select id="course" name="course">
            <option value="BCA">BCA</option>
            <option value="BBA">BBA</option>
            <option value="Btech">Btech</option>
            <option value="BSA">BSA</option>
            <option value="MCA">MCA</option>
            <option value="MBA">MBA</option>
            <option value="Mtech">Mtech</option>
          </select>
          <span id="courseError" class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="branch">Branch</label>
          <select id="branch" name="branch">
            <option value="CSE">CSE</option>
            <option value="IT">IT</option>
            <option value="ECE">ECE</option>
            <option value="EEE">EEE</option>
            <option value="MECH">MECH</option>
            <option value="CIVIL">CIVIL</option>
          </select>
          <span id="branchError" class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="year">Year of Study</label>
          <select id="year" name="year">
            <option value="1st year">1st year</option>
            <option value="2nd year">2nd year</option>
            <option value="3rd year">3rd year</option>
            <option value="4th year">4th year</option>
          </select>
          <span id="yearError" class="error-message"></span>
        </div>

        <div class="form-group">
          <label>Gender</label>
          <input type="radio" id="male" name="gender" value="male" />
          <label for="male">Male</label>
          <input type="radio" id="female" name="gender" value="female" />
          <label for="female">Female</label>
          <input type="radio" id="other" name="gender" value="other" />
          <label for="other">Other</label>
          <span id="genderError" class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" />
          <span id="phoneError" class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" />
          <span id="emailError" class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="nationality">Nationality</label>
          <input type="text" id="nationality" name="nationality" />
          <span id="nationalityError" class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="address">Address</label>
          <textarea id="address" cols="80" rows="5" name="address"></textarea>
          <span id="addressError" class="error-message"></span>
        </div>

        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
