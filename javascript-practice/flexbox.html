<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flexbox Learning</title>
  <link rel="stylesheet" href="flex.css">
</head>
<body>

  <h1>Flexbox Learning Playground 🚀</h1>

  <!-- STEP 1 -->
  <h2>Step 1: Flex Direction</h2>
  <div class="container step1">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
  </div>

  <!-- STEP 2 -->
  <h2>Step 2: Justify Content</h2>
  <div class="container step1 step2">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
  </div>

  <!-- STEP 3 -->
  <h2>Step 3: Align Items</h2>
  <div class="container step1 step2 step3">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
  </div>

  <!-- STEP 4 -->
  <h2>Step 4: Flex Wrap</h2>
  <div class="container step1 step4">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
  </div>

  <!-- STEP 5 -->
  <h2>Step 5: Flex Grow</h2>
  <div class="container step1">
    <div class="box box-grow">1</div>
    <div class="box box-grow">2</div>
    <div class="box box-grow">3</div>
  </div>

</body>
</html>
